stages:
  - build
  - test
  - quality
  - package
  - deploy

variables:
  PWD: ip172-18-0-52-d0kabpi91nsg00aa2cig

before_script:
  - chmod +x ./mvnw

cache:
  paths:
    - .m2/repository
  key: "$CI_JOB_NAME"

build_job:
  stage: build
  image: eclipse-temurin:17-jdk-alpine
  script:
    - ./mvnw clean compile \
      -Dhttps.protocols=TLSv1.2 \
      -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository \
      --batch-mode --errors --fail-at-end --show-version

test_job:
  stage: test
  image: eclipse-temurin:17-jdk-alpine
  script:
    - ./mvnw test \
      -Dhttps.protocols=TLSv1.2 \
      -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository \
      --batch-mode --errors --fail-at-end --show-version

code_quality_job:
  stage: quality
  allow_failure: true
  image: docker:stable
  services:
    - docker:dind
  script:
    - mkdir -p codequality-results
    - docker run \
        --env CODECLIMATE_CODE="$PWD" \
        --volume "$PWD":/code \
        --volume /var/run/docker.sock:/var/run/docker.sock \
        --volume /tmp/cc:/tmp/cc \
        codeclimate/codeclimate analyze -f html > ./codequality-results/index.html
  artifacts:
    paths:
      - codequality-results/

package_job:
  stage: package
  image: eclipse-temurin:17-jdk-alpine
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
  script:
    - apk add --no-cache docker-cli-compose
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - ./mvnw clean install -PbuildDocker -DskipTests=true \
      -Dhttps.protocols=TLSv1.2 \
      -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository \
      --batch-mode --errors --fail-at-end --show-version
    - docker compose build
    - docker compose push

deploy_staging_job:
  stage: deploy
  image: alpine
  script:
    - apk add --no-cache docker-cli-compose
    - export DOCKER_HOST=tcp://$PWD.direct.labs.play-with-docker.com:2375
    - docker compose down || true
    - docker compose up -d
  environment:
    name: staging
    url: http://$PWD-8080.direct.labs.play-with-docker.com
